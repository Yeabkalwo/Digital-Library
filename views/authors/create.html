<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Author - Digital Library</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="nav-wrapper">
            <div class="brand-logo"><span></span> DigitalLibrary</div>
            <nav><ul class="nav-menu" id="nav-menu"></ul></nav>
        </div>
    </header>

    <main class="app-container" style="padding:2rem; max-width:1200px; margin:0 auto;">
        <div class="form-card">
            <h2>Register New Author</h2>
            <form id="create-author-form" style="margin-top:1.5rem;">
                <div class="form-group">
                    <label>Author Full Name</label>
                    <input type="text" name="name" required placeholder="e.g., Brandon Sanderson">
                </div>
                <div class="form-group">
                    <label>Nationality</label>
                    <input type="text" name="nationality" placeholder="e.g., American">
                </div>
                <div class="form-group">
                    <label>Birth Year</label>
                    <input type="number" name="birth_year" placeholder="e.g., 1975">
                </div>
                <div class="form-group">
                    <label>Biography</label>
                    <textarea name="biography" rows="4" placeholder="Enter summary bio timeline metadata..."></textarea>
                </div>
                <div class="row-actions" style="margin-top:2rem;">
                    <button type="submit" class="btn btn-primary" style="background-color:var(--success);">Save Author</button>
                    <a href="/authors/index.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <hr>
    <footer style="text-align:center; padding:1rem; color:var(--text-muted);">
        <p>&copy; <span id="footer-year"></span> Digital Library System. Built by Yeabkal Wondwosen.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script src="/js/authors/create.js"></script>
</body>
</html>
