<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digital Library</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="nav-wrapper">
            <div class="brand-logo"><span></span> DigitalLibrary</div>
            <nav><ul class="nav-menu" id="nav-menu"></ul></nav>
        </div>
    </header>

    <main class="app-container" style="padding:2rem; max-width:1200px; margin:0 auto;">
        <div class="form-card" style="max-width:450px; margin:4rem auto;">
            <h2 style="margin-bottom:1.5rem;">Librarian Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding:0.75rem;">Login</button>
            </form>
            <p style="margin-top:1.5rem; text-align:center; font-size:0.9rem; color:var(--text-muted);">
                Need an account? <a href="/auth/register.html">Register here</a>
            </p>
        </div>
    </main>

    <hr>
    <footer style="text-align:center; padding:1rem; color:var(--text-muted);">
        <p>&copy; <span id="footer-year"></span> Digital Library System. Built by Yeabkal Wondwosen.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script src="/js/auth/login.js"></script>
</body>
</html>
