<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access Requests - Digital Library</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="nav-wrapper">
            <div class="brand-logo"><span></span> DigitalLibrary</div>
            <nav><ul class="nav-menu" id="nav-menu"></ul></nav>
        </div>
    </header>

    <main class="app-container">
        <div class="page-header-block">
            <h2>Librarian Access Requests</h2>
            <p class="form-hint" style="margin:0;">Review and approve or decline users requesting administrator privileges.</p>
        </div>

        <div class="table-responsive-container">
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Requested</th>
                        <th>Message</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="requests-body">
                    <tr><td colspan="6" class="empty-state">Loading requests...</td></tr>
                </tbody>
            </table>
        </div>
            <div id="pagination"></div>
    </main>

    <footer>
        <p>&copy; <span id="footer-year"></span> Digital Library System. Built by Yeabkal Wondwosen.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script src="/js/admin/user-requests.js"></script>
</body>
</html>
