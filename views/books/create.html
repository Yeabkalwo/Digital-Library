<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - Digital Library</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="nav-wrapper">
            <div class="brand-logo"><span></span> DigitalLibrary</div>
            <nav><ul class="nav-menu" id="nav-menu"></ul></nav>
        </div>
    </header>

    <main class="app-container" style="padding:2rem; max-width:1200px; margin:0 auto;">
        <div class="form-card">
            <h2>Add New Book Record</h2>
            <form id="create-book-form" style="margin-top:1.5rem;">
                <div class="form-group">
                    <label>Book Title</label>
                    <input type="text" name="title" required placeholder="e.g., The Way of Kings">
                </div>
                <div class="form-group">
                    <label>ISBN Code</label>
                    <input type="text" name="isbn" required placeholder="e.g., 9780765326355">
                </div>
                <div class="form-group">
                    <label>Author Assignment</label>
                    <select name="author_id" id="author-select" required>
                        <option value="">Select an author</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Publication Year</label>
                    <input type="number" name="publication_year" placeholder="e.g., 2010">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        <option value="available" selected>Available</option>
                        <option value="borrowed">Borrowed</option>
                        <option value="reserved">Reserved</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="4" placeholder="Enter full abstract overview copy..."></textarea>
                </div>
                <div class="row-actions" style="margin-top:2rem;">
                    <button type="submit" class="btn btn-primary" style="background-color:var(--success);">Save to Catalog</button>
                    <a href="/books/admin-dashboard.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <hr>
    <footer style="text-align:center; padding:1rem; color:var(--text-muted);">
        <p>&copy; <span id="footer-year"></span> Digital Library System. Built by Yeabkal Wondwosen.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script src="/js/books/create.js"></script>
</body>
</html>
