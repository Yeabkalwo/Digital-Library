<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book - Digital Library</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="nav-wrapper">
            <div class="brand-logo"><span></span> DigitalLibrary</div>
            <nav><ul class="nav-menu" id="nav-menu"></ul></nav>
        </div>
    </header>

    <main class="app-container" style="padding:2rem; max-width:1200px; margin:0 auto;">
        <div class="form-card">
            <h2 id="form-title">Edit Book</h2>
            <form id="edit-book-form" style="margin-top:1.5rem;">
                <div class="form-group">
                    <label>Book Title</label>
                    <input type="text" name="title" required>
                </div>
                <div class="form-group">
                    <label>ISBN Code</label>
                    <input type="text" name="isbn" required>
                </div>
                <div class="form-group">
                    <label>Author Assignment</label>
                    <select name="author_id" id="author-select" required></select>
                </div>
                <div class="form-group">
                    <label>Publication Year</label>
                    <input type="number" name="publication_year">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        <option value="available">Available</option>
                        <option value="borrowed">Borrowed</option>
                        <option value="reserved">Reserved</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="4"></textarea>
                </div>
                <div class="row-actions" style="margin-top:2rem;">
                    <button type="submit" class="btn btn-primary">Update Records</button>
                    <a href="/books/admin-dashboard.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="footer-year"></span> Digital Library System. Built by Yeabkal Wondwosen.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script src="/js/books/edit.js"></script>
</body>
</html>
