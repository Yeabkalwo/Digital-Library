<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Catalog - Digital Library</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="nav-wrapper">
            <div class="brand-logo"><span></span> DigitalLibrary</div>
            <nav><ul class="nav-menu" id="nav-menu"></ul></nav>
        </div>
    </header>

    <main class="app-container" style="padding:2rem; max-width:1200px; margin:0 auto;">
        <div class="page-header-block">
            <h2>Digital Books Catalog</h2>
            <form id="search-form" class="search-filter-bar">
                <div class="search-input-wrapper">
                    <input type="text" name="search" id="search-input" placeholder="Search title, author, isbn...">
                </div>
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
        <div class="items-grid" id="books-grid"></div>
            <div id="pagination"></div>
    </main>

    <hr>
    <footer style="text-align:center; padding:1rem; color:var(--text-muted);">
        <p>&copy; <span id="footer-year"></span> Digital Library System. Built by Yeabkal Wondwosen.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script src="/js/books/index.js"></script>
</body>
</html>
