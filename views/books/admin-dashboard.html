<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Digital Library</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="nav-wrapper">
            <div class="brand-logo"><span></span> DigitalLibrary</div>
            <nav><ul class="nav-menu" id="nav-menu"></ul></nav>
        </div>
    </header>

    <main class="app-container" style="padding:2rem; max-width:1200px; margin:0 auto;">
        <div class="page-header-block">
            <h2>Admin Library Inventory Control</h2>
            <div class="row-actions">
                <a href="/books/create.html" class="btn btn-primary" style="background-color:var(--success);">+ Add New Book</a>
                <a href="/authors/create.html" class="btn btn-primary">+ Add New Author</a>
            </div>
        </div>
        <div class="table-responsive-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>ISBN</th>
                        <th>Author</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="books-table-body"></tbody>
            </table>
        </div>
            <div id="pagination"></div>
    </main>

    <hr>
    <footer style="text-align:center; padding:1rem; color:var(--text-muted);">
        <p>&copy; <span id="footer-year"></span> Digital Library System. Built by Yeabkal Wondwosen.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script src="/js/books/admin-dashboard.js"></script>
</body>
</html>
